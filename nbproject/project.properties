annotation.processing.enabled=true
annotation.processing.enabled.in.editor=false
annotation.processing.run.all.processors=true
application.title=RestaurantManagement
application.vendor=student
build.classes.dir=${build.dir}/classes
build.classes.excludes=**/*.java,**/*.form
build.dir=build
build.generated.dir=${build.dir}/generated
build.generated.sources.dir=${build.dir}/generated-sources
build.java.dir=src
build.javadoc.dir=${build.dir}/javadoc
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
build.test.src.dir=test
clean-on-fail.enabled=true
debug.test.fork=true
dist.dir=dist
dist.jar=${dist.dir}/RestaurantManagement.jar
dist.javadoc.dir=${dist.dir}/javadoc
exclude.from.jar=
file.reference.flatlaf=lib/flatlaf-3.2.5.jar
file.reference.jasperreports=lib/jasperreports-6.20.5.jar
file.reference.mysqlconnector=lib/mysql-connector-j-8.2.0.jar
includes=**
jar.compress=true
javac.classpath=${file.reference.mysqlconnector}:${file.reference.jasperreports}:${file.reference.flatlaf}
javac.compilerargs=-Xlint:unchecked
javac.deprecation=false
javac.modulepath=
javac.processorpath=${javac.classpath}
javac.source=17
javac.target=17
javac.test.classpath=${javac.classpath}
javac.test.processorpath=${javac.classpath}
javadoc.additionalparam=
javadoc.author=false
javadoc.encoding=${source.encoding}
javadoc.noindex=true
javadoc.nonavbar=true
javadoc.notree=true
javadoc.private=false
javadoc.splitindex=true
javadoc.use=true
javadoc.version=false
javadoc.windowtitle=
main.class=com.restaurant.App
manifest.file=manifest.mf
meta.inf.dir=META-INF
platform.active=default_platform
run.classpath=${javac.classpath}:${build.classes.dir}
run.jvmargs=-Dfile.encoding=UTF-8
run.test.classpath=${javac.test.classpath}:${build.test.classes.dir}
source.encoding=UTF-8
src.dir=src
test.src.dir=test
